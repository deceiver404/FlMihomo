name: release-ssid-policy

on:
  workflow_dispatch:
    inputs:
      is_stable:
        description: 'Is this a stable release?'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      target_platform:
        description: 'Target platform to build: mac, android, or all'
        required: false
        default: 'all'
        type: choice
        options:
          - 'mac'
          - 'android'
          - 'all'
env:
  IS_STABLE: ${{ github.event.inputs.is_stable || 'true' }}
  TARGET_PLATFORM: ${{ github.event.inputs.target_platform || 'all' }}

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
          - platform: macos
            os: macos-latest
            arch: arm64

    steps:
      - name: Check if platform should run
        id: should_run
        run: |
          TARGET="${{ env.TARGET_PLATFORM }}"
          PLATFORM="${{ matrix.platform }}"

          if [ "$TARGET" = "all" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          elif [ "$TARGET" = "mac" ] && [ "$PLATFORM" = "macos" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          elif [ "$TARGET" = "android" ] && [ "$PLATFORM" = "android" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
            echo "Skipping $PLATFORM (target: $TARGET)"
          fi

      - name: Checkout
        if: steps.should_run.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Android Signing
        if: steps.should_run.outputs.run == 'true' && startsWith(matrix.platform,'android')
        run: |
          echo "${{ secrets.KEYSTORE }}" | base64 --decode > android/app/keystore.jks
          echo "${{ secrets.SERVICE_JSON }}" | base64 --decode > android/app/google-services.json
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/local.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> android/local.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/local.properties

      - name: Setup Go
        if: steps.should_run.outputs.run == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: |
            core/go.sum

      - name: Setup Flutter
        if: steps.should_run.outputs.run == 'true'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.35.7
          cache: true

      - name: Get Flutter Dependency
        if: steps.should_run.outputs.run == 'true'
        run: |
          flutter --version
          flutter pub get

      - name: Setup
        if: steps.should_run.outputs.run == 'true'
        run: dart setup.dart ${{ matrix.platform }} ${{ matrix.arch && format('--arch {0}', matrix.arch) }} ${{ env.IS_STABLE == 'true' && '--env stable' || '' }}

      - name: Upload
        if: steps.should_run.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.platform }}${{ matrix.arch && format('-{0}', matrix.arch) }}
          path: ./dist
          overwrite: true
